services:
  db:
    image: mysql:8.0
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: nhan123
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - ./mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network

  # Dịch vụ web app (Next.js)
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: web-app
    environment:
      DATABASE_URL: "mysql://user:password@db:3306/mydatabase"
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - app-network

  doc:
    build:
      context: ./apps/docs
      dockerfile: Dockerfile
    container_name: doc-app
    environment:
      DATABASE_URL: "mysql://user:password@db:3306/mydatabase"
    ports:
      - "4000:3000"
    depends_on:
      - db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
